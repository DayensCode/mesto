<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Место</title>
        <link rel="stylesheet" href="./pages/index.css" />
    </head>
    <body class="page">
        <header class="header">
            <img src="./images/header-logo.svg" alt="Логотип Место." class="header__logo" />
        </header>

        <main>
            <section class="profile" aria-label="Профиль">
                <div class="profile__user">
                    <img src="./images/profile-avatar.jpg" alt="Аватар профиля." class="profile__avatar" />
                    <div class="profile__info">
                        <div class="profile__name">
                            <h1 class="profile__title">Жак-Ив Кусто</h1>
                            <button class="profile__edit-button" type="button" aria-label="Редактировать информацию профиля"></button>
                        </div>
                        <p class="profile__subtitle">Исследователь океана</p>
                    </div>
                </div>
                <button class="profile__add-button" type="button" aria-label="Добавить фото места"></button>
            </section>

            <section class="elements" aria-label="Галерея"></section>
        </main>

        <footer class="footer">
            <p class="footer__copyright">&copy; 2022 Mesto Russia</p>
        </footer>

        <div class="popup popup_edit">
            <div class="popup__container">
                <button class="popup__close-button popup__close-button-for-edit" type="button" aria-label="Закрыть окно"></button>
                <h2 class="popup__title">Редактировать профиль</h2>
                <form class="popup__form popup__form_edit" name="edit-info" method="POST">
                    <input type="text" class="popup__input popup__input_type_name" name="name" placeholder="Имя" />
                    <input type="text" class="popup__input popup__input_type_info" name="info" placeholder="О себе" />
                    <button class="popup__save-button" type="submit">Сохранить</button>
                </form>
            </div>
        </div>

        <div class="popup popup_add">
            <div class="popup__container">
                <button class="popup__close-button popup__close-button-for-add" type="button" aria-label="Закрыть окно"></button>
                <h2 class="popup__title">Новое место</h2>
                <form class="popup__form popup__form_add" name="add-mesto" method="POST">
                    <input type="text" class="popup__input popup__input_type_mesto-title" name="name" placeholder="Название" />
                    <input type="text" class="popup__input popup__input_type_mesto-link" name="link" placeholder="Ссылка на картинку" />
                    <button class="popup__save-button" type="submit">Создать</button>
                </form>
            </div>
        </div>

        <div class="popup popup_view">
            <div class="popup__container popup__view-container">
                    <button class="popup__close-button-for-view" type="button" aria-label="Закрыть окно"></button>
                    <img class="popup__photo" src=" " alt="Фотография места.">
                    <p class="popup__description"></p>
            </div>
        </div>

        <template id="element-template">
            <article class="element">
                <img class="element__photo" src=" " alt="Фотография места.">
                <div class="element__container">
                    <h2 class="element__title"></h2>
                    <button class="element__like" type="button" aria-label="Поставить лайк"></button>
                    <button class="element__trash" type="button" aria-label="Удалить место"></button>
                </div>
            </article>
        </template>

        <script src="./scripts/cards.js"></script>
        <script src="./scripts/index.js"></script>
    </body>
</html>
